<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0f0f1a"/>
  <!-- Torch glow -->
  <radialGradient id="glow" cx="50%" cy="38%" r="45%">
    <stop offset="0%" stop-color="#e8841a" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#0f0f1a" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="80" fill="url(#glow)"/>
  <!-- 3x3 grid of tiles -->
  <g fill="none" stroke="#3a3a5a" stroke-width="3">
    <!-- Row 1 -->
    <rect x="80"  y="180" width="96" height="96" rx="12" fill="#1e1e2e"/>
    <rect x="208" y="180" width="96" height="96" rx="12" fill="#2a0808"/>
    <rect x="336" y="180" width="96" height="96" rx="12" fill="#1e1e2e"/>
    <!-- Row 2 -->
    <rect x="80"  y="308" width="96" height="96" rx="12" fill="#251a00"/>
    <rect x="208" y="308" width="96" height="96" rx="12" fill="#001508"/>
    <rect x="336" y="308" width="96" height="96" rx="12" fill="#1e1e2e"/>
  </g>
  <!-- Enemy skull on center tile -->
  <text x="256" y="248" font-size="58" text-anchor="middle" dominant-baseline="middle">💀</text>
  <!-- Gold on bottom-left -->
  <text x="128" y="356" font-size="40" text-anchor="middle" dominant-baseline="middle">🪙</text>
  <!-- Exit door -->
  <text x="384" y="356" font-size="40" text-anchor="middle" dominant-baseline="middle">🚪</text>
  <!-- Title text -->
  <text x="256" y="120" font-family="Georgia, serif" font-size="38" font-weight="bold"
        fill="#e8a030" text-anchor="middle" letter-spacing="4"
        filter="url(#ts)">CRYPTIC GRIDS</text>
  <filter id="ts">
    <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#e8841a" flood-opacity="0.7"/>
  </filter>
  <!-- Unrevealed tile (back side pattern) at top-left -->
  <rect x="80" y="180" width="96" height="96" rx="12" fill="#22223a" stroke="#3a3a5a" stroke-width="3"/>
  <line x1="88" y1="188" x2="164" y2="264" stroke="#3a3a5a" stroke-width="1.5" opacity="0.4"/>
  <line x1="164" y1="188" x2="88" y2="264" stroke="#3a3a5a" stroke-width="1.5" opacity="0.4"/>
  <!-- Unrevealed tile top-right -->
  <rect x="336" y="180" width="96" height="96" rx="12" fill="#22223a" stroke="#3a3a5a" stroke-width="3"/>
  <line x1="344" y1="188" x2="420" y2="264" stroke="#3a3a5a" stroke-width="1.5" opacity="0.4"/>
  <line x1="420" y1="188" x2="344" y2="264" stroke="#3a3a5a" stroke-width="1.5" opacity="0.4"/>
  <!-- Unrevealed tile bottom-right -->
  <rect x="336" y="308" width="96" height="96" rx="12" fill="#22223a" stroke="#3a3a5a" stroke-width="3"/>
  <line x1="344" y1="316" x2="420" y2="392" stroke="#3a3a5a" stroke-width="1.5" opacity="0.4"/>
  <line x1="420" y1="316" x2="344" y2="392" stroke="#3a3a5a" stroke-width="1.5" opacity="0.4"/>
</svg>
